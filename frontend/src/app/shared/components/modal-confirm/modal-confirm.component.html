<div
  class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 transition-all"
>
  <div
    class="bg-white rounded-xl shadow-2xl max-w-md w-full overflow-hidden transform transition-all animate-in fade-in zoom-in duration-200"
  >
    <div class="p-6">
      <div class="flex items-center gap-4 mb-4">
        <div
          class="w-12 h-12 rounded-full bg-red-100 flex items-center justify-center text-red-600 flex-shrink-0"
        >
          <app-icon name="warning" class="h-6 w-6"></app-icon>
        </div>
        <h3 class="text-xl font-bold text-gray-900">Confirmar exclusão</h3>
      </div>
      <p class="text-gray-600 mb-6">{{ message }}</p>
      <div class="flex gap-3 justify-end">
        <button
          (click)="onCancel.emit()"
          class="btn px-6 py-2.5 text-gray-700 hover:bg-gray-100"
        >
          Cancelar
        </button>
        <button
          (click)="onConfirm.emit()"
          class="btn btn-danger px-6 py-2.5 shadow-lg shadow-red-200"
        >
          Excluir
        </button>
      </div>
    </div>
  </div>
</div>
