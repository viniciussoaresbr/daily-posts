<main class="container mx-auto px-4 max-w-2xl pb-12">
  <!-- Create Post Section -->
  <section class="mb-10">
    <div class="card shadow-lg border-primary-50">
      <form [formGroup]="postForm" (ngSubmit)="onSubmit()">
        <textarea
          formControlName="text"
          class="w-full border-none focus:ring-0 p-0 text-lg placeholder-gray-400 resize-none min-h-[100px]"
          placeholder="O que você está pensando?"
          maxLength="400"
        ></textarea>

        <div
          class="flex justify-between items-center mt-4 pt-4 border-t border-gray-100"
        >
          <span
            class="text-xs text-gray-400"
            [class.text-red-500]="postForm.get('text')?.value?.length >= 400"
          >
            {{ postForm.get("text")?.value?.length || 0 }}/400
          </span>
          <button
            type="submit"
            [disabled]="postForm.invalid || isLoading"
            class="btn btn-primary px-8 py-2.5 shadow-md shadow-primary-200"
          >
            Postar
          </button>
        </div>
      </form>
    </div>
  </section>

  <!-- Posts Navigation -->
  <div class="flex gap-8 mb-6 border-b border-gray-200">
    <button
      (click)="switchTab('all')"
      [class.text-primary-600]="activeTab === 'all'"
      [class.border-primary-600]="activeTab === 'all'"
      class="pb-4 px-2 font-bold transition-all border-b-2 border-transparent hover:text-primary-500"
    >
      Todos os Posts
    </button>
    <button
      (click)="switchTab('myPosts')"
      [class.text-primary-600]="activeTab === 'myPosts'"
      [class.border-primary-600]="activeTab === 'myPosts'"
      class="pb-4 px-2 font-bold transition-all border-b-2 border-transparent hover:text-primary-500"
    >
      Meus Posts
    </button>
  </div>

  <!-- Posts List -->
  <div class="space-y-4 animate-in fade-in duration-500">
    <div *ngIf="isLoadingList" class="space-y-4">
      <div *ngFor="let i of [1, 2, 3]" class="card animate-pulse">
        <div class="flex gap-4 mb-4">
          <div class="w-10 h-10 rounded-full bg-gray-200"></div>
          <div class="h-4 bg-gray-200 rounded w-1/3 mt-2"></div>
        </div>
        <div class="h-4 bg-gray-100 rounded w-full mb-2"></div>
        <div class="h-4 bg-gray-100 rounded w-2/3"></div>
      </div>
    </div>

    <ng-container *ngIf="!isLoadingList">
      <app-post-card
        *ngFor="let post of displayedPosts"
        [post]="post"
        [canDelete]="post.authorId === currentUserId"
        [isLiking]="likingPostIds.has(post.id)"
        (onDelete)="confirmDelete($event)"
        (onLike)="toggleLike($event)"
      ></app-post-card>

      <div
        *ngIf="displayedPosts.length === 0"
        class="text-center py-20 bg-gray-50 rounded-xl border-2 border-dashed border-gray-200"
      >
        <div class="text-gray-400 mb-2">
          <app-icon name="empty-posts" class="h-12 w-12 mx-auto"></app-icon>
        </div>
        <p class="text-gray-500 font-medium">Nenhum post encontrado</p>
      </div>
    </ng-container>
  </div>
</main>

<app-modal-confirm
  *ngIf="showDeleteModal"
  message="Você tem certeza que deseja excluir esse post? Essa ação não pode ser desfeita."
  (onConfirm)="handleDelete()"
  (onCancel)="showDeleteModal = false"
></app-modal-confirm>
